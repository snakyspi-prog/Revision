<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AQA GCSE Geography — Mind Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f3ef;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column}
:root{
  --c-coast:#2563EB;--c-coast-l:#DBEAFE;--c-coast-t:#1e40af;
  --c-econ:#D97706;--c-econ-l:#FEF3C7;--c-econ-t:#92400e;
  --c-river:#059669;--c-river-l:#D1FAE5;--c-river-t:#065f46;
  --c-settle:#7C3AED;--c-settle-l:#EDE9FE;--c-settle-t:#4c1d95;
  --c-climate:#DC2626;--c-climate-l:#FEE2E2;--c-climate-t:#7f1d1d;
  --c-center:#374151;--c-center-l:#F3F4F6;
  --border:#e5e3df;--bg:#f5f3ef;--bg2:#ffffff;--text:#1a1a1a;--text2:#6b7280;--text3:#9ca3af
}
@media(prefers-color-scheme:dark){
  :root{
    --c-coast:#60a5fa;--c-coast-l:#1e3a5f;--c-coast-t:#93c5fd;
    --c-econ:#fbbf24;--c-econ-l:#451a03;--c-econ-t:#fde68a;
    --c-river:#34d399;--c-river-l:#064e3b;--c-river-t:#6ee7b7;
    --c-settle:#a78bfa;--c-settle-l:#2e1065;--c-settle-t:#c4b5fd;
    --c-climate:#f87171;--c-climate-l:#450a0a;--c-climate-t:#fca5a5;
    --c-center:#9ca3af;--c-center-l:#1f2937;
    --border:#374151;--bg:#111827;--bg2:#1f2937;--text:#f9fafb;--text2:#9ca3af;--text3:#6b7280
  }
  body{background:var(--bg)}
}

#app{display:flex;flex-direction:column;height:100vh;min-height:680px;overflow:hidden}

/* TOP BAR */
#topbar{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;flex-wrap:wrap;min-height:56px
}
#topbar h1{font-family:'Lora',serif;font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;margin-right:4px}
#topbar h1 span{font-style:italic;font-weight:400;color:var(--text2)}
#search{
  flex:1;min-width:140px;max-width:240px;height:34px;
  padding:0 12px;border:1px solid var(--border);border-radius:20px;
  font-size:13px;font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);outline:none
}
#search:focus{border-color:var(--c-coast)}
.pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 11px;border-radius:20px;font-size:12px;font-weight:500;
  border:1.5px solid;cursor:pointer;transition:all .15s;white-space:nowrap;
  background:transparent
}
.pill.active,.pill:hover{background:var(--pill-fill)!important;color:var(--pill-text)!important}
#pill-coast{--pill-fill:var(--c-coast-l);--pill-text:var(--c-coast-t);color:var(--c-coast);border-color:var(--c-coast)}
#pill-econ{--pill-fill:var(--c-econ-l);--pill-text:var(--c-econ-t);color:var(--c-econ);border-color:var(--c-econ)}
#pill-river{--pill-fill:var(--c-river-l);--pill-text:var(--c-river-t);color:var(--c-river);border-color:var(--c-river)}
#pill-settle{--pill-fill:var(--c-settle-l);--pill-text:var(--c-settle-t);color:var(--c-settle);border-color:var(--c-settle)}
#pill-climate{--pill-fill:var(--c-climate-l);--pill-text:var(--c-climate-t);color:var(--c-climate);border-color:var(--c-climate)}
#pill-all{color:var(--text2);border-color:var(--border)}
#pill-all.active,#pill-all:hover{background:var(--bg)!important;color:var(--text)!important}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}
#graph-pane{flex:1;min-width:0;position:relative;overflow:hidden;background:var(--bg)}
#graph-svg{width:100%;height:100%;display:block;cursor:grab}
#graph-svg:active{cursor:grabbing}

/* DETAIL PANEL */
#detail{
  width:0;overflow:hidden;
  transition:width .3s cubic-bezier(.4,0,.2,1);
  background:var(--bg2);border-left:1px solid var(--border);
  flex-shrink:0
}
#detail.open{width:310px}
#detail-inner{width:310px;height:100%;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px}

.d-badge{
  display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;
  margin-bottom:2px
}
.d-title{font-family:'Lora',serif;font-size:18px;font-weight:600;line-height:1.3;color:var(--text)}
.d-def{
  background:var(--bg);border-left:3px solid var(--border);
  padding:8px 12px;border-radius:0 6px 6px 0;
  font-size:12.5px;color:var(--text2);line-height:1.6
}
.d-def strong{color:var(--text);font-weight:500}
.d-facts-wrap{display:flex;flex-direction:column;gap:1px}
.d-fact{
  padding:7px 10px 7px 24px;position:relative;
  font-size:13px;line-height:1.55;color:var(--text);
  border-bottom:1px solid var(--border)
}
.d-fact:last-child{border-bottom:none}
.d-fact::before{
  content:'';position:absolute;left:10px;top:13px;
  width:5px;height:5px;border-radius:50%;background:var(--node-col,#888)
}
.d-facts-wrap.quiz-hide .d-fact{opacity:0;pointer-events:none}
.d-tip{
  padding:9px 12px;border-radius:8px;
  font-size:12px;line-height:1.55;font-weight:500
}
.d-mnemonic{
  padding:8px 12px;border-radius:8px;border:1px dashed;
  font-size:12px;font-family:'Lora',serif;font-style:italic
}

/* action buttons row */
.d-actions{display:flex;gap:8px;flex-wrap:wrap}
.d-btn{
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;
  font-family:'DM Sans',sans-serif;cursor:pointer;
  border:1px solid var(--border);background:var(--bg);color:var(--text);
  transition:all .15s
}
.d-btn:hover{background:var(--bg2);border-color:var(--text2)}
.d-btn.done{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
@media(prefers-color-scheme:dark){.d-btn.done{background:#064e3b;color:#6ee7b7;border-color:#059669}}
.d-btn.revealed{background:var(--c-econ-l);color:var(--c-econ-t);border-color:var(--c-econ)}

.d-related{display:flex;flex-wrap:wrap;gap:6px}
.d-related-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;width:100%}
.d-rel-btn{
  padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:500;
  border:1px solid var(--border);background:var(--bg);color:var(--text2);
  cursor:pointer;transition:all .12s
}
.d-rel-btn:hover{color:var(--text);border-color:var(--text2)}

/* FOOTER */
#footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 16px;background:var(--bg2);border-top:1px solid var(--border);
  flex-shrink:0;font-size:12px;color:var(--text2)
}
#progress-bar-wrap{flex:1;max-width:200px;height:5px;background:var(--border);border-radius:3px;margin:0 12px}
#progress-bar{height:5px;border-radius:3px;background:var(--c-river);transition:width .4s}
#hint{color:var(--text3);font-size:11.5px}

/* SVG node & link styles */
.link{fill:none}
.link.cross{fill:none}
.node-circle{stroke-width:2;transition:r .22s cubic-bezier(.34,1.4,.64,1),opacity .15s,stroke-width .12s;cursor:pointer}
.node-g:hover .node-circle{stroke-width:3.5}
.node-g.faded .node-circle,.node-g.faded .node-lbg,.node-g.faded .node-ltxt{opacity:.1}
.check-mark{font-size:9px;pointer-events:none;dominant-baseline:central;text-anchor:middle}
#tt{position:fixed;pointer-events:none;z-index:9999;background:#ffffff;border:1px solid #e5e3df;border-radius:8px;padding:5px 12px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;color:#1a1a1a;box-shadow:0 4px 20px rgba(0,0,0,.14);opacity:0;transition:opacity .1s;white-space:nowrap}
@media(prefers-color-scheme:dark){#tt{background:#1f2937;border-color:#374151;color:#f9fafb}}
</style>
</head>
<body>
<div id="tt"></div>
<div id="app">

  <div id="topbar">
    <h1>AQA GCSE Geography <span>Mind Map</span></h1>
    <input id="search" type="text" placeholder="Search topics…" oninput="onSearch(this.value)" autocomplete="off">
    <button id="pill-all"   class="pill active" onclick="filterSection('all')">All</button>
    <button id="pill-coast" class="pill" onclick="filterSection('coasts')">Coasts</button>
    <button id="pill-econ"  class="pill" onclick="filterSection('economic')">Economic</button>
    <button id="pill-river" class="pill" onclick="filterSection('rivers')">Rivers</button>
    <button id="pill-settle"class="pill" onclick="filterSection('settlements')">Settlements</button>
    <button id="pill-climate"class="pill" onclick="filterSection('climate')">Climate</button>
  </div>

  <div id="main">
    <div id="graph-pane">
      <svg id="graph-svg"></svg>
    </div>
    <div id="detail">
      <div id="detail-inner"></div>
    </div>
  </div>

  <div id="footer">
    <span id="prog-text">0 / 44 reviewed</span>
    <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
    <span id="hint">Click a node to explore • Drag to rearrange • Scroll to zoom</span>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>

  center:{title:'AQA GCSE Geography',badge:'Overview',sec:'center',

    facts:['Gentrification: wealthier residents buy and renovate inner-city housing → displacement of original residents','Suburbanisation: people move outward from city to suburbs → urban sprawl','Counter-urbanisation: movement from cities to rural areas; commuter villages grow','Re-urbanisation: movement back into city centres (young professionals, students)','Urban regeneration: government-led renewal of deprived inner-city areas (e.g. London Docklands, 1980s)','Green belt: land designated around cities to prevent urban sprawl'],
    tip:'Know all four processes: Suburbanisation (out), Counter-urbanisation (to rural), Re-urbanisation (back to city), Gentrification (in-place change)',
    related:['burgess','hierarchy','megacities']},

  dataanalysis:{title:'Data Analysis & Evaluation',badge:'Settlements',sec:'settlements',
    def:'AQA Paper 3 requires skills in presenting, interpreting, and critically evaluating geographical data.',
    facts:['Primary data: collected by you (measurements, questionnaires, photos) — specific but small sample','Secondary data: collected by others (census, OS maps, EA reports) — large scale but may be outdated','Quantitative: numerical data (discharge readings, population counts) — can be statistically analysed','Qualitative: descriptive data (photos, interview responses) — richer context but harder to compare','Spearman\'s Rank Correlation: measures relationship between two ranked datasets (-1 to +1); +1 = perfect positive','Evaluation questions: Was sample size big enough? Was method reliable? Were conditions typical?'],
    tip:'For evaluation: always consider RELIABILITY (accuracy of method), VALIDITY (does it measure what you intended?), and REPRESENTATIVENESS',
    related:['fieldwork','megacities']},

  megacities:{title:'Megacities & Mumbai',badge:'Settlements',sec:'settlements',
    def:'A megacity has a population of more than 10 million people. In 1950 there were 2; by 2024 there are over 40.',
    facts:['Most megacities are now in LEDCs/NEEs: Mumbai, Delhi, Lagos, Dhaka, Kinshasa','Rural push factors: no jobs, poverty, lack of services, drought/flood destroys livelihoods','Urban pull factors: more jobs, higher wages (even informal), better health/education','Mumbai: population ~21 million; financial capital of India; Bollywood (largest film industry)','Dharavi slum: ~1 million people in 2.1 km²; its informal recycling economy = ~$665m/year','Challenges: traffic congestion, air pollution, lack of affordable housing, strain on infrastructure'],
    tip:'Always give SPECIFIC data for Mumbai: 21m population, Dharavi 1m in 2.1km², $665m recycling economy',
    related:['hierarchy','landuse','informal','globalise']},

  // ── CLIMATE ──
  deforest:{title:'Amazon Deforestation',badge:'Climate',sec:'climate',
    def:'The Amazon is the world\'s largest tropical rainforest (5.5 million km²) — and is under severe threat.',
    facts:['~70% of deforested Amazon land becomes cattle pasture for beef/leather industry','Soya farming: Brazil is world\'s largest soya exporter; grown mainly to feed livestock globally','Logging: valuable hardwood (mahogany) illegally felled and exported','Roads (Trans-Amazonian Highway) open up forest to colonisation and further deforestation','Environmental: loses ~10% of all Earth\'s species; carbon release → climate change; soil erosion; disrupted water cycle','Brazil reduced deforestation 80% between 2004–2012 using satellite monitoring (PRODES system); rose again post-2019'],
    tip:'Use specific statistics: Amazon = 5.5 million km², 10% of all species, cattle = 70% of cleared land, REDD+ scheme',
    related:['climchange','desertify','mangroves']},

  desertify:{title:'Desertification (Sahel)',badge:'Climate',sec:'climate',
    def:'The degradation of productive semi-arid land into desert-like conditions — mainly at the margins of existing deserts.',
    facts:['Sahel: semi-arid belt across Africa (Senegal to Ethiopia); 250+ million people depend on it','Physical causes: unreliable rainfall, increasing drought frequency due to climate change','Human causes: overgrazing, overcultivation, population growth, deforestation for fuelwood','Effects: food insecurity (2011 East Africa famine — 250,000+ deaths), mass migration, loss of biodiversity','The Great Green Wall: pan-African project to plant an 8,000 km belt of trees from Senegal to Djibouti','Traditional solutions: Zai pits (stone lines trap water), crop rotation, sustainable herd management'],
    tip:'Causes are both PHYSICAL (drought) and HUMAN (overgrazing, deforestation) — AQA wants both discussed',
    related:['climchange','deforest']},

  climchange:{title:'Causes of Climate Change',badge:'Climate',sec:'climate',
    def:'Climate is changing due to both natural cycles and, predominantly since 1750, human (anthropogenic) activities.',
    facts:['Natural — Milankovitch cycles: variations in Earth\'s orbit (100,000yr), tilt (41,000yr), wobble (23,000yr)','Natural — Solar output: sunspot cycles alter solar energy received; Maunder Minimum = Little Ice Age','Natural — Volcanoes: SO₂ aerosols cause short-term cooling (1–3 years)','Human — Fossil fuels: CO₂ from coal/oil/gas has risen from 280 ppm (1750) to 420 ppm (2024)','Human — Deforestation: forests are carbon sinks; destroying them releases stored carbon','Human — Agriculture: cattle produce methane (CH₄); rice paddies; fertilisers release N₂O'],
    tip:'2024 = +1.2°C above pre-industrial. 97% of climate scientists agree humans are primary cause. Current CO₂ = highest in 800,000 years.',
    related:['volcanoes','deforest','desertify','sealevel','coral']},

  volcanoes:{title:'Volcanic Impact on Climate',badge:'Climate',sec:'climate',
    def:'Volcanic eruptions can temporarily cool the climate through aerosol injection, but are a minor factor in long-term warming.',
    facts:['Large eruptions inject SO₂ into the stratosphere → forms sulphate aerosols → reflects sunlight → cooling','Effect lasts 1–3 years; then aerosols settle out','Pinatubo 1991 (Philippines, 2nd largest 20th-century eruption): 20 million tonnes SO₂; global temp dropped ~0.5°C in 1992–93','Tambora 1815: largest in recorded history; caused "Year Without a Summer" (1816) — crop failures, famine','Volcanoes emit ~200–300 million tonnes CO₂/year globally','Humans emit ~35–40 billion tonnes CO₂/year — ~100× more than all volcanoes (USGS/NOAA)'],
    tip:'Key contrast: Volcanoes = SHORT-TERM cooling (SO₂ aerosols). Humans = LONG-TERM warming (CO₂ accumulation). Volcanoes cannot explain the sustained post-1750 warming trend.',
    related:['climchange','ringfire']},
};

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let selectedId = null;
let sectionFilter = 'all';
let searchQuery = '';
let reviewedSet = new Set();
let quizRevealedSet = new Set();
const TOTAL_TOPICS = NODES.filter(n=>n.level===2).length;

// ═══════════════════════════════════════════════════
// D3 GRAPH
// ═══════════════════════════════════════════════════
const svg = d3.select('#graph-svg');
const g = svg.append('g');
let simNodes, simLinks;
let simulation;
let nodeSelection, linkSelection;
let W, H;

const r = d=>d.level===0?30:d.level===1?20:11;
const rSel = d=>d.level===0?36:d.level===1?26:16;

function initGraph(){
  const pane = document.getElementById('graph-pane');
  W = pane.clientWidth; H = pane.clientHeight;
  svg.attr('viewBox',`0 0 ${W} ${H}`);

  simNodes = NODES.map(d=>({...d}));
  const nodeById = Object.fromEntries(simNodes.map(d=>[d.id,d]));
  simLinks = LINKS.map(d=>({...d, source:nodeById[d.s], target:nodeById[d.t]}));

  // radius by level (r and rSel are global)

  // links — use explicit attr stroke so CSS vars aren't needed
  const dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const linkColor      = dark ? '#374151' : '#d1cfc9';
  const linkCrossColor = dark ? '#4b5563' : '#b0aea8';

  linkSelection = g.selectAll('.link').data(simLinks)
    .join('line')
    .attr('class', d=>d.cross?'link cross':'link')
    .attr('stroke',        d=>d.cross ? linkCrossColor : linkColor)
    .attr('stroke-width',  d=>d.cross ? 0.8 : 1)
    .attr('stroke-dasharray', d=>d.cross ? '4 3' : null)
    .attr('fill', 'none');

  const tt = document.getElementById('tt');
  function moveTT(ev){
    const tw=tt.offsetWidth,th=tt.offsetHeight,m=12;
    let x=ev.clientX+m, y=ev.clientY-th-m;
    if(x+tw>window.innerWidth-4) x=ev.clientX-tw-m;
    if(y<4) y=ev.clientY+m;
    tt.style.left=x+'px'; tt.style.top=y+'px';
  }

  // nodes
  const nodeGroups = g.selectAll('.node-g').data(simNodes)
    .join('g')
    .attr('class','node-g')
    .call(d3.drag()
      .on('start',(ev,d)=>{if(!ev.active)simulation.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;tt.style.opacity=0})
      .on('drag',(ev,d)=>{d.fx=ev.x;d.fy=ev.y})
      .on('end',(ev,d)=>{if(!ev.active)simulation.alphaTarget(0);d.fx=null;d.fy=null})
    )
    .on('click',(ev,d)=>{ev.stopPropagation();tt.style.opacity=0;selectNode(d.id)})
    .on('mouseenter',(ev,d)=>{
      tt.textContent = d.label.replace(/\n/g,' ');
      tt.style.opacity=1; moveTT(ev);
    })
    .on('mousemove', moveTT)
    .on('mouseleave',()=>{ tt.style.opacity=0; });

  // circle (base bubble)
  nodeGroups.append('circle')
    .attr('class','node-circle')
    .attr('r', r)
    .attr('fill', d=>SEC_COLORS[d.sec].fill)
    .attr('stroke', d=>SEC_COLORS[d.sec].stroke);

  // Label pill (always visible for level 0+1; hidden for level 2 until selected)
  nodeGroups.each(function(d){
    const el = d3.select(this);
    const parts = d.label.split('\n');
    const c = SEC_COLORS[d.sec];
    const fs = d.level===0?10.5:d.level===1?9.5:8.5;
    const pad = 7;
    const lineH = fs*1.35;
    const maxLen = Math.max(...parts.map(p=>p.length));
    const bgW = Math.max(maxLen*fs*0.58 + pad*2, 40);
    const bgH = parts.length*lineH + pad;
    const bgY = -(bgH/2);
    const isAlwaysVisible = d.level < 2;

    el.append('rect')
      .attr('class','node-lbg')
      .attr('x',-bgW/2).attr('y',bgY)
      .attr('width',bgW).attr('height',bgH)
      .attr('rx',bgH/2)
      .attr('fill',c.fill).attr('stroke',c.stroke).attr('stroke-width',1)
      .style('display', isAlwaysVisible ? null : 'none');

    const txt = el.append('text')
      .attr('class','node-ltxt')
      .attr('fill', d.level===0?c.text:c.stroke)
      .style('font-size',fs+'px')
      .style('font-weight', d.level<2?'600':'500')
      .style('display', isAlwaysVisible ? null : 'none');

    if(parts.length===1){
      txt.attr('text-anchor','middle').attr('dominant-baseline','central').attr('dy','0.1em').text(d.label);
    } else {
      const totalH = (parts.length-1)*lineH;
      parts.forEach((p,i)=>{
        txt.append('tspan')
          .attr('x',0)
          .attr('dy', i===0 ? `${-totalH/2/fs}em` : `${lineH/fs}em`)
          .attr('text-anchor','middle')
          .text(p);
      });
    }
  });

  // reviewed checkmark (small tick above bubble)
  nodeGroups.append('text')
    .attr('class','check-mark')
    .attr('fill','#059669')
    .attr('y', d=>-(r(d)+6))
    .attr('dy','0.35em')
    .text('✓')
    .style('display','none')
  simulation = d3.forceSimulation(simNodes)
    .force('link', d3.forceLink(simLinks).id(d=>d.id)
      .distance(d=> d.source.level===0?130: d.source.level===1?80:60)
      .strength(d=>d.cross?0.05:0.6))
    .force('charge', d3.forceManyBody().strength(d=>d.level===0?-600:d.level===1?-300:-120))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide().radius(d=>r(d)+8))
    .on('tick', ticked);

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.25,3])
    .on('zoom', ev=>g.attr('transform', ev.transform)));

  // click background to deselect
  svg.on('click', ()=>{ if(selectedId){selectedId=null;updatePanel();updateNodeStyles();} });
}

function ticked(){
  linkSelection
    .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
    .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  g.selectAll('.node-g')
    .attr('transform',d=>`translate(${d.x},${d.y})`);
}

// ═══════════════════════════════════════════════════
// NODE SELECTION & STYLING
// ═══════════════════════════════════════════════════
function selectNode(id){
  selectedId = id;
  updatePanel();
  updateNodeStyles();
  // open detail panel
  document.getElementById('detail').classList.add('open');
}

function updateNodeStyles(){
  const nodeGroups = g.selectAll('.node-g');
  nodeGroups.each(function(d){
    const el = d3.select(this);
    const c = SEC_COLORS[d.sec];
    const isSelected = d.id === selectedId;
    const inFilter = sectionFilter==='all' || d.sec===sectionFilter || d.level<2;
    const matchSearch = !searchQuery || d.label.toLowerCase().includes(searchQuery) ||
      (CONTENT[d.id]&&JSON.stringify(CONTENT[d.id]).toLowerCase().includes(searchQuery));

    el.classed('faded', !inFilter || (searchQuery && !matchSearch));

    // bubble size
    el.select('.node-circle')
      .attr('stroke-width', isSelected ? 3 : 2)
      .attr('r', isSelected ? rSel(d) : r(d));

    // label pill: always show for level 0/1, only show for level 2 when selected
    const showLabel = d.level < 2 || isSelected;
    el.select('.node-lbg').style('display', showLabel ? null : 'none');
    el.select('.node-ltxt').style('display', showLabel ? null : 'none');

    // pulse ring on selected
    el.select('.node-circle')
      .attr('stroke-width', isSelected ? 3 : 2)
      .attr('stroke', isSelected ? c.stroke : c.stroke);
  });
}

// ═══════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════
function updatePanel(){
  const panel = document.getElementById('detail-inner');
  if(!selectedId){ document.getElementById('detail').classList.remove('open'); panel.innerHTML=''; return; }
  const c = CONTENT[selectedId];
  if(!c){ panel.innerHTML=`<p style="font-size:13px;color:var(--text2)">No content yet for this topic.</p>`; return; }

  const sc = SEC_COLORS[c.sec]||SEC_COLORS.center;
  const isReviewed = reviewedSet.has(selectedId);
  const isQuizRevealed = quizRevealedSet.has(selectedId);
  const nodeCol = sc.stroke;

  panel.innerHTML = `
    <button class="d-btn" style="float:right;font-size:11px;padding:4px 10px" onclick="closePanel()">✕ Close</button>
    <div class="d-badge" style="background:${sc.fill};color:${sc.text}">${c.badge}</div>
    <h2 class="d-title">${c.title}</h2>
    ${c.def?`<div class="d-def">${c.def}</div>`:''}
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase">Key Facts</span>
        <button class="d-btn" id="quiz-btn" style="font-size:11px;padding:3px 10px" onclick="toggleQuiz('${selectedId}')">${isQuizRevealed?'Hide facts':'Quiz me'}</button>
      </div>
      <div class="d-facts-wrap${isQuizRevealed?'':' quiz-hide'}" id="facts-wrap" style="--node-col:${nodeCol};border:1px solid var(--border);border-radius:8px;overflow:hidden">
        ${c.facts.map(f=>`<div class="d-fact">${f}</div>`).join('')}
      </div>
      ${!isQuizRevealed?`<div style="text-align:center;padding:14px;font-size:12px;color:var(--text3)">Facts hidden — click "Reveal" to check</div>`:''}
    </div>
    ${c.tip?`<div class="d-tip" style="background:${sc.fill};color:${sc.text}">💡 ${c.tip}</div>`:''}
    ${c.mnemonic?`<div class="d-mnemonic" style="color:${sc.text};border-color:${sc.stroke}">✦ ${c.mnemonic}</div>`:''}
    <div class="d-actions">
      <button class="d-btn ${isReviewed?'done':''}" onclick="toggleReviewed('${selectedId}')">
        ${isReviewed?'✓ Reviewed':'Mark as reviewed'}
      </button>
    </div>
    ${c.related&&c.related.length?`
    <div class="d-related">
      <span class="d-related-label">Related topics</span>
      ${c.related.map(id=>{
        const n=NODES.find(x=>x.id===id);
        const rc=SEC_COLORS[(CONTENT[id]||{sec:'center'}).sec]||SEC_COLORS.center;
        return n?`<button class="d-rel-btn" style="border-color:${rc.stroke};color:${rc.stroke}" onclick="selectNode('${id}')">${n.label.replace('\n',' ')}</button>`:'';
      }).join('')}
    </div>`:''}
  `;
}

function closePanel(){
  selectedId = null;
  document.getElementById('detail').classList.remove('open');
  updateNodeStyles();
}

function toggleQuiz(id){
  if(quizRevealedSet.has(id)) quizRevealedSet.delete(id);
  else quizRevealedSet.add(id);
  updatePanel();
}

function toggleReviewed(id){
  if(reviewedSet.has(id)) reviewedSet.delete(id);
  else reviewedSet.add(id);
  updateProgress();
  updateNodeStyles();
  // update check marks
  g.selectAll('.node-g').each(function(d){
    const show = reviewedSet.has(d.id);
    d3.select(this).select('.check-mark')
      .style('display', show ? null : 'none');
  });
  updatePanel();
}

function updateProgress(){
  const n = [...reviewedSet].filter(id=>{
    const node=NODES.find(x=>x.id===id);
    return node&&node.level===2;
  }).length;
  document.getElementById('prog-text').textContent=`${n} / ${TOTAL_TOPICS} reviewed`;
  document.getElementById('progress-bar').style.width=`${(n/TOTAL_TOPICS)*100}%`;
}

// ═══════════════════════════════════════════════════
// FILTERS & SEARCH
// ═══════════════════════════════════════════════════
function filterSection(sec){
  sectionFilter = sec;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.getElementById(`pill-${sec==='all'?'all':
    sec==='coasts'?'coast':sec==='economic'?'econ':
    sec==='rivers'?'river':sec==='settlements'?'settle':'climate'}`).classList.add('active');
  updateNodeStyles();
}

function onSearch(val){
  searchQuery = val.toLowerCase().trim();
  updateNodeStyles();
  if(searchQuery){
    // Auto-select first match
    const match = NODES.find(n=>n.level===2&&(n.label.toLowerCase().includes(searchQuery)||
      (CONTENT[n.id]&&JSON.stringify(CONTENT[n.id]).toLowerCase().includes(searchQuery))));
    if(match){ selectNode(match.id); }
  }
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  initGraph();
  // set hint to disappear after 5s
  setTimeout(()=>{ document.getElementById('hint').style.opacity='0'; },5000);
});
window.addEventListener('resize',()=>{
  const pane = document.getElementById('graph-pane');
  W=pane.clientWidth; H=pane.clientHeight;
  svg.attr('viewBox',`0 0 ${W} ${H}`);
  simulation.force('center',d3.forceCenter(W/2,H/2)).alpha(.3).restart();
});
</script>
</body>
</html>
